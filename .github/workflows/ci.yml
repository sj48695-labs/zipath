name: CI

on:
  pull_request:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: Lint / Build / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npx turbo build --filter='./packages/*'

      - name: Lint
        run: npx turbo lint

      - name: Build apps
        run: npx turbo build

      - name: Test
        run: npm test -w @zipath/api -- --passWithNoTests

  auto-merge:
    name: Auto Merge
    needs: ci
    runs-on: ubuntu-latest

    steps:
      - name: Merge PR
        run: gh pr merge "${{ github.event.number }}" --squash --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}
