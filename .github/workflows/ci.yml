name: CI

on:
  pull_request:
    branches: [develop]

jobs:
  ci:
    name: Lint / Build / Test
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npx turbo build --filter='./packages/*'

      - name: Lint
        run: npx turbo lint

      - name: Build apps
        run: npx turbo build

      - name: Test
        run: npm test -w @zipath/api -- --passWithNoTests
