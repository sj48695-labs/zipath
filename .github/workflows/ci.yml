name: CI

on:
  pull_request:
    branches: [develop, main]
  push:
    branches: [develop]

permissions:
  contents: write
  pull-requests: write

jobs:
  ci:
    name: Lint / Build / Test
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16-alpine
        env:
          POSTGRES_USER: zipath
          POSTGRES_PASSWORD: zipath
          POSTGRES_DB: zipath_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    env:
      DATABASE_URL: postgresql://zipath:zipath@localhost:5432/zipath_test
      NODE_ENV: test
      JWT_SECRET: ci-test-secret
      PORT: 3001
      DATA_GO_KR_API_KEY: ci-placeholder
      NEXT_PUBLIC_API_URL: http://localhost:3001

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Cache Turbo
        uses: actions/cache@v4
        with:
          path: .turbo
          key: ${{ runner.os }}-turbo-${{ github.sha }}
          restore-keys: |
            ${{ runner.os }}-turbo-

      - run: npm ci

      - name: Lint
        run: npx turbo lint

      - name: Build
        run: npx turbo build

      - name: Unit tests
        run: npm test -w @zipath/api

      - name: E2E tests
        run: npm run test:e2e -w @zipath/api

  auto-merge:
    name: Auto Merge
    needs: ci
    runs-on: ubuntu-latest
    if: |
      github.event_name == 'pull_request' &&
      contains(github.event.pull_request.labels.*.name, 'auto-merge')

    steps:
      - name: Merge PR
        run: gh pr merge "${{ github.event.number }}" --squash --repo "${{ github.repository }}"
        env:
          GH_TOKEN: ${{ github.token }}
