name: CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - run: npm ci

      - name: Build packages
        run: npx turbo build --filter='./packages/*'

      - name: Lint
        run: npx turbo lint

      - name: Test
        run: npm test -w @zipath/api
